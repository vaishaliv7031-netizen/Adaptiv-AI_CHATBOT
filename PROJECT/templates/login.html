<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Agent - Gateway Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d1224;
            color: #fff;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background-color: #111726;
            border: 1px solid #1e294b;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: #64748b;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2563eb, #6366f1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 15px auto;
            box-shadow: 0 8px 16px -4px rgba(99, 102, 241, 0.5);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .input-wrapper {
            background: #1e294b;
            border: 1px solid #334155;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 2px 4px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #1e294b;
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .google-btn:hover {
            background: #e2e8f0;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        .error-banner {
            display: none;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            padding: 12px;
            color: #f87171;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
        }

        .demo-badge {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 11px;
            text-align: center;
            margin-top: 25px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="header">
            <div class="logo-icon">🎓</div>
            <h1>Programming Agent</h1>
            <p>Access your personalized learning workspace</p>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <form id="loginForm" onsubmit="handleDemoLogin(event);">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter admin" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter 123" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
        </form>

        <div class="divider">Or Sign In with</div>

        <button onclick="window.location.href='/google-login'" class="google-btn">
            <!-- Google Minimal SVG icon -->
            <svg class="google-icon" viewBox="0 0 24 24" width="100%" height="100%">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
            </svg>
            Sign in with Google
        </button>

        <div class="demo-badge">
            <b>🔑 Demo Credentials:</b><br>
            Username: <code style="color: #60a5fa">admin</code> &nbsp;&bull;&nbsp; Password: <code style="color: #60a5fa">123</code>
        </div>

    </div>

    <script>
        function handleDemoLogin(event) {
            event.preventDefault();
            const errorBanner = document.getElementById("errorBanner");
            const userVal = document.getElementById("username").value.trim();
            const passVal = document.getElementById("password").value;
            const submitBtn = document.getElementById("submitBtn");

            submitBtn.innerText = "Signing in...";
            submitBtn.disabled = true;
            errorBanner.style.display = "none";

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: userVal,
                    password: passVal
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.message === "success") {
                    window.location.href = "/";
                } else {
                    errorBanner.innerText = data.error || "Invalid user credentials";
                    errorBanner.style.display = "block";
                    submitBtn.innerText = "Sign In";
                    submitBtn.disabled = false;
                }
            })
            .catch(err => {
                errorBanner.innerText = "Database Connection Offline";
                errorBanner.style.display = "block";
                submitBtn.innerText = "Sign In";
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
